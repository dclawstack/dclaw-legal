replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-legal
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8099

ingress:
  enabled: true
  className: nginx
  host: legal.dclawstack.io

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

secrets:
  databaseUrl: "postgresql+asyncpg://legal:legal@postgres:5432/dclaw_legal"
  openrouterApiKey: ""

ollama:
  baseUrl: "http://ollama:11434"

postgresql:
  enabled: true
  storage: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""
