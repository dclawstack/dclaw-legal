apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dclaw-legal.fullname" . }}-secrets
  labels:
    {{- include "dclaw-legal.labels" . | nindent 4 }}
type: Opaque
data:
  database_url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- if .Values.secrets.openrouterApiKey }}
  openrouter_api_key: {{ .Values.secrets.openrouterApiKey | b64enc | quote }}
  {{- end }}
